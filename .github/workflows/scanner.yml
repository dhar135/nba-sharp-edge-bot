name: Sharp Edge Auto-Scanner

on:
  schedule:
    # Runs at the top of every hour. Note: GitHub Actions uses UTC time!
    - cron: '0 * * * *'
  workflow_dispatch: # This allows you to click a button in GitHub to run it manually

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Stable version for our dependencies
          cache: 'pip' # Speeds up future runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Math Engine
        env:
          # This pulls the secret you pasted in Step 3
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }} 
        run: |
          python src/main.py